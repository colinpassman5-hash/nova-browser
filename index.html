<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NOVA</title>
</head>

<body style="margin:0; background:#000; color:#fff; display:flex; flex-direction:column; justify-content:center; align-items:center; height:100vh; font-family:system-ui;">

<div id="output" style="margin-bottom:20px; max-width:600px; text-align:center;">
Nova is online.
</div>

<form id="form" style="display:flex; gap:10px;">
  <input id="input" style="padding:12px; width:300px;" autocomplete="off" placeholder="Ask Nova..." />
  <button type="submit">Send</button>
</form>

<script>
const form = document.getElementById("form");
const input = document.getElementById("input");
const output = document.getElementById("output");

async function send(message) {
  output.innerText = "Processing...";

  const res = await fetch("/api/nova", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ message })
  });

  const data = await res.json();
  output.innerText = data.reply;
}

form.addEventListener("submit", (e) => {
  e.preventDefault();

  const message = input.value.trim();
  if (!message) return;

  input.value = "";
  send(message);
});
</script>

</body>
</html>
