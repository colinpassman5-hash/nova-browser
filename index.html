<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NOVA</title>

<style>
body {
  margin: 0;
  background: #050505;
  color: #eaeaea;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

#container {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  max-width: 700px;
  margin: auto;
  width: 90%;
}

#conversation {
  flex: 1;
  overflow-y: auto;
  padding-top: 40px;
}

.message {
  margin: 12px 0;
  line-height: 1.5;
  opacity: 0;
  transform: translateY(10px);
  animation: fadeIn 0.4s ease forwards;
}

.user {
  color: #888;
}

.nova {
  color: #ffffff;
}

@keyframes fadeIn {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

#inputBar {
  display: flex;
  margin: 20px 0;
}

input {
  flex: 1;
  padding: 14px;
  border-radius: 10px;
  border: none;
  background: #111;
  color: white;
  outline: none;
}

button {
  margin-left: 10px;
  padding: 14px 18px;
  border-radius: 10px;
  border: none;
  background: white;
  color: black;
  cursor: pointer;
}

</style>
</head>

<body>

<div id="container">
  <div id="conversation"></div>

  <div id="inputBar">
    <input id="input" placeholder="Talk to Nova..." />
    <button onclick="send()">→</button>
  </div>
</div>

<script>

let hasStarted = false;

function addMessage(text, type) {
  const div = document.createElement("div");
  div.className = "message " + type;
  div.innerText = text;
  document.getElementById("conversation").appendChild(div);
  div.scrollIntoView({ behavior: "smooth" });
}

function initialPresence() {
  setTimeout(() => addMessage("Hey.", "nova"), 400);
  setTimeout(() => addMessage("I'm here.", "nova"), 1200);
  setTimeout(() => addMessage("You don’t need to explain everything perfectly.", "nova"), 2200);
  setTimeout(() => addMessage("Just start where your head is at.", "nova"), 3200);
}

initialPresence();

async function send() {
  const input = document.getElementById("input");
  const text = input.value.trim();
  if (!text) return;

  addMessage("> " + text, "user");
  input.value = "";

  const res = await fetch("/api/nova", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ message: text })
  });

  const data = await res.json();

  setTimeout(() => addMessage(data.reply, "nova"), 600);
}

</script>

</body>
</html>
