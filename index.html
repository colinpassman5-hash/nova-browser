<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"
  />
  <title>NOVA</title>
  <style>
    :root {
      --bg-top: #0e1726;
      --bg-bottom: #071019;
      --panel: rgba(255, 255, 255, 0.06);
      --panel-strong: rgba(255, 255, 255, 0.09);
      --border: rgba(255, 255, 255, 0.10);
      --text: #f3f6fb;
      --muted: rgba(243, 246, 251, 0.68);
      --soft: rgba(243, 246, 251, 0.44);
      --accent: #b7e1ff;
      --accent-2: #d7f2ff;
      --user: rgba(160, 206, 255, 0.14);
      --nova: rgba(255, 255, 255, 0.05);
      --shadow: 0 18px 60px rgba(0, 0, 0, 0.34);
      --radius-xl: 26px;
      --radius-lg: 20px;
      --radius-md: 16px;
      --content-max: 920px;
      --composer-h: 132px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 20% 12%, rgba(164, 210, 255, 0.12), transparent 24%),
        radial-gradient(circle at 80% 10%, rgba(214, 242, 255, 0.08), transparent 22%),
        linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: radial-gradient(circle at center, black 38%, transparent 86%);
      opacity: 0.55;
    }

    #app {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .topbar {
      flex: 0 0 auto;
      padding: 18px 18px 14px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01));
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .topbar-inner {
      width: min(100%, var(--content-max));
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-orb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #fff, var(--accent-2) 28%, #9ccfff 60%, transparent 80%);
      box-shadow: 0 0 22px rgba(183, 225, 255, 0.42);
      flex: 0 0 auto;
    }

    .brand-copy strong {
      display: block;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.18em;
    }

    .brand-copy span {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }

    .status {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }

    .feed-wrap {
      flex: 1 1 auto;
      min-height: 0;
      overflow: hidden;
    }

    #feed {
      height: 100%;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 22px 18px calc(var(--composer-h) + 28px);
      scroll-behavior: smooth;
      overscroll-behavior: contain;
    }

    .feed-inner {
      width: min(100%, var(--content-max));
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-height: 100%;
    }

    .system {
      align-self: center;
      color: var(--soft);
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      padding: 4px 0;
    }

    .message {
      max-width: min(100%, 760px);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      animation: rise 220ms ease;
      overflow: hidden;
    }

    .message.nova {
      align-self: flex-start;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02)),
        var(--nova);
    }

    .message.user {
      align-self: flex-end;
      background:
        linear-gradient(180deg, rgba(183,225,255,0.12), rgba(183,225,255,0.05)),
        var(--user);
      border-color: rgba(183,225,255,0.18);
    }

    .message-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px 0;
    }

    .message-role {
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--soft);
    }

    .message-time {
      font-size: 11px;
      color: var(--soft);
      white-space: nowrap;
    }

    .message-body {
      padding: 8px 16px 16px;
      font-size: 16px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .typing {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 2px 0;
    }

    .typing span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(255,255,255,0.7);
      animation: blink 1s infinite ease-in-out;
    }

    .typing span:nth-child(2) { animation-delay: 120ms; }
    .typing span:nth-child(3) { animation-delay: 240ms; }

    .composer-shell {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 5;
      padding: 14px 18px calc(14px + env(safe-area-inset-bottom));
      background: linear-gradient(180deg, rgba(7,16,25,0), rgba(7,16,25,0.78) 28%, rgba(7,16,25,0.98));
      pointer-events: none;
    }

    .composer {
      width: min(100%, var(--content-max));
      margin: 0 auto;
      pointer-events: auto;
      border: 1px solid var(--border);
      border-radius: 24px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.03)),
        rgba(9, 17, 28, 0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .composer-top {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: end;
      padding: 16px 16px 10px;
    }

    #input {
      display: block;
      width: 100%;
      min-height: 78px;
      max-height: 180px;
      resize: none;
      overflow-y: auto;
      margin: 0;
      padding: 0;
      border: none;
      outline: none;
      background: transparent;
      color: var(--text);
      font: inherit;
      font-size: 17px;
      line-height: 1.5;
      letter-spacing: -0.01em;
    }

    #input::placeholder {
      color: rgba(243, 246, 251, 0.40);
    }

    #send {
      appearance: none;
      border: none;
      outline: none;
      cursor: pointer;
      width: 56px;
      height: 56px;
      border-radius: 18px;
      background: linear-gradient(135deg, #dff4ff, #aaceff);
      color: #0a1320;
      font-size: 22px;
      font-weight: 700;
      box-shadow: 0 12px 30px rgba(183,225,255,0.22);
      transition: transform 120ms ease, opacity 120ms ease;
    }

    #send:hover {
      transform: translateY(-1px);
    }

    #send:disabled {
      opacity: 0.48;
      cursor: not-allowed;
      transform: none;
    }

    .composer-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0 16px 14px;
      font-size: 12px;
      color: var(--muted);
    }

    .composer-state {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .pulse {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 14px rgba(183,225,255,0.35);
    }

    @keyframes blink {
      0%, 80%, 100% {
        opacity: 0.35;
        transform: scale(0.75);
      }
      40% {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 640px) {
      :root {
        --composer-h: 158px;
      }

      .topbar {
        padding: 14px 14px 12px;
      }

      #feed {
        padding: 18px 14px calc(var(--composer-h) + 24px);
      }

      .composer-shell {
        padding: 10px 14px calc(12px + env(safe-area-inset-bottom));
      }

      .composer-top {
        grid-template-columns: 1fr;
      }

      #send {
        width: 100%;
        height: 50px;
        border-radius: 14px;
      }

      .status {
        display: none;
      }

      .message-body {
        font-size: 15px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <div class="brand-orb"></div>
          <div class="brand-copy">
            <strong>NOVA</strong>
            <span id="headerSub">By the creek. No rush. Start wherever you are.</span>
          </div>
        </div>
        <div class="status" id="sessionText">Session waking up…</div>
      </div>
    </header>

    <div class="feed-wrap">
      <div id="feed">
        <div class="feed-inner" id="feedInner"></div>
      </div>
    </div>

    <div class="composer-shell">
      <div class="composer">
        <div class="composer-top">
          <textarea
            id="input"
            rows="1"
            placeholder="Talk to Nova..."
            autocomplete="off"
            spellcheck="false"
          ></textarea>
          <button id="send" aria-label="Send">↑</button>
        </div>
        <div class="composer-bottom">
          <div class="composer-state">
            <div class="pulse"></div>
            <div id="composerState">Presence active</div>
          </div>
          <div>Enter to send · Shift+Enter for a new line</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const state = {
      sessionId: makeId(),
      busy: false,
      messages: []
    };

    const feed = document.getElementById("feed");
    const feedInner = document.getElementById("feedInner");
    const input = document.getElementById("input");
    const send = document.getElementById("send");
    const composerState = document.getElementById("composerState");
    const sessionText = document.getElementById("sessionText");
    const headerSub = document.getElementById("headerSub");

    function makeId() {
      return "nova-" + Math.random().toString(36).slice(2, 10);
    }

    function timeLabel() {
      return new Date().toLocaleTimeString([], { hour: "numeric", minute: "2-digit" });
    }

    function autoGrow() {
      input.style.height = "auto";
      input.style.height = Math.min(input.scrollHeight, 180) + "px";
    }

    function scrollToBottom(force = false) {
      requestAnimationFrame(() => {
        const nearBottom = feed.scrollHeight - feed.scrollTop - feed.clientHeight < 120;
        if (force || nearBottom) {
          feed.scrollTo({ top: feed.scrollHeight, behavior: "smooth" });
        }
      });
    }

    function addSystem(text) {
      const el = document.createElement("div");
      el.className = "system";
      el.textContent = text;
      feedInner.appendChild(el);
      scrollToBottom(true);
    }

    function addMessage(role, text) {
      const wrap = document.createElement("article");
      wrap.className = "message " + role;

      const head = document.createElement("div");
      head.className = "message-head";

      const roleEl = document.createElement("div");
      roleEl.className = "message-role";
      roleEl.textContent = role === "nova" ? "Nova" : "You";

      const timeEl = document.createElement("div");
      timeEl.className = "message-time";
      timeEl.textContent = timeLabel();

      const body = document.createElement("div");
      body.className = "message-body";
      body.textContent = text;

      head.appendChild(roleEl);
      head.appendChild(timeEl);
      wrap.appendChild(head);
      wrap.appendChild(body);
      feedInner.appendChild(wrap);

      state.messages.push({ role, text, time: new Date().toISOString() });
      scrollToBottom(true);
    }

    function addTyping() {
      const wrap = document.createElement("article");
      wrap.className = "message nova";
      wrap.id = "typing";

      const head = document.createElement("div");
      head.className = "message-head";

      const roleEl = document.createElement("div");
      roleEl.className = "message-role";
      roleEl.textContent = "Nova";

      const timeEl = document.createElement("div");
      timeEl.className = "message-time";
      timeEl.textContent = timeLabel();

      const body = document.createElement("div");
      body.className = "message-body";
      body.innerHTML = '<span class="typing"><span></span><span></span><span></span></span>';

      head.appendChild(roleEl);
      head.appendChild(timeEl);
      wrap.appendChild(head);
      wrap.appendChild(body);
      feedInner.appendChild(wrap);
      scrollToBottom(true);
    }

    function removeTyping() {
      const el = document.getElementById("typing");
      if (el) el.remove();
    }

    async function welcome() {
      addSystem("Presence settled");
      await wait(260);
      addMessage("nova", "Hey. Come sit a minute.");
      headerSub.textContent = "Soft entry. Real conversation.";
      await wait(420);
      addMessage("nova", "You don’t need the perfect words here.");
      await wait(480);
      addMessage("nova", "Tell me what’s on your mind, what you’re building, or what feels tangled. We can start easy.");
      composerState.textContent = "Ready";
      input.focus();
    }

    async function submit() {
      const text = input.value.trim();
      if (!text || state.busy) return;

      state.busy = true;
      send.disabled = true;
      composerState.textContent = "Listening";

      addMessage("user", text);
      input.value = "";
      autoGrow();

      addTyping();
      composerState.textContent = "Thinking";

      try {
        const res = await fetch("/api/nova", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            sessionId: state.sessionId,
            message: text,
            history: state.messages.slice(-10)
          })
        });

        const data = await res.json();
        removeTyping();

        if (!res.ok) {
          throw new Error(data && data.error ? data.error : "Request failed");
        }

        addMessage("nova", data.reply || "I’m here. Keep going.");
        headerSub.textContent = data.headerSub || "Still with you.";
        composerState.textContent = "Ready";
        sessionText.textContent = "Live session · " + state.sessionId;
      } catch (err) {
        removeTyping();
        addMessage("nova", "Something slipped in transit. The thread is still here. Send that again.");
        headerSub.textContent = "Temporary interruption.";
        composerState.textContent = "Retry";
      } finally {
        state.busy = false;
        send.disabled = false;
        input.focus();
        scrollToBottom(true);
      }
    }

    function wait(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    input.addEventListener("input", autoGrow);

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        submit();
      }
    });

    send.addEventListener("click", submit);

    sessionText.textContent = "Live session · " + state.sessionId;
    autoGrow();
    welcome();
  </script>
</body>
</html>
