<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NOVA</title>

<style>
body {
  margin: 0;
  font-family: system-ui, -apple-system, sans-serif;
  background: #05070d;
  color: white;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

#output {
  width: 80%;
  max-width: 700px;
  min-height: 120px;
  padding: 20px;
  border-radius: 12px;
  background: rgba(255,255,255,0.05);
  margin-bottom: 20px;
  text-align: center;
}

form {
  width: 80%;
  max-width: 700px;
  display: flex;
  gap: 10px;
}

input {
  flex: 1;
  padding: 14px;
  border-radius: 10px;
  border: none;
  outline: none;
}

button {
  padding: 14px 18px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
}
</style>
</head>

<body>

<div id="output">Nova is online.</div>

<form id="form">
  <input id="input" placeholder="Ask Nova..." autocomplete="off"/>
  <button type="submit">Send</button>
</form>

<script>
const form = document.getElementById("form");
const input = document.getElementById("input");
const output = document.getElementById("output");

async function sendNova(message) {
  output.innerText = "Processing...";

  const res = await fetch("/api/nova", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ message })
  });

  const data = await res.json();
  output.innerText = data.reply;
}

form.addEventListener("submit", (e) => {
  e.preventDefault();

  const message = input.value.trim();
  if (!message) return;

  input.value = "";
  sendNova(message);
});
</script>

</body>
</html>
