<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NOVA</title>

<style>
body {
  margin: 0;
  background: #000;
  overflow: hidden;
  font-family: -apple-system, sans-serif;
  color: white;
}

/* CORE FIELD */
#field {
  position: absolute;
  width: 100%;
  height: 100%;
  overflow: hidden;
}

/* ENERGY LAYER */
#orb {
  position: absolute;
  width: 300px;
  height: 300px;
  background: radial-gradient(circle, rgba(0,150,255,0.6), transparent 70%);
  border-radius: 50%;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  filter: blur(40px);
  animation: pulse 4s infinite ease-in-out;
}

@keyframes pulse {
  0% { transform: translate(-50%, -50%) scale(0.9); opacity: 0.6; }
  50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
  100% { transform: translate(-50%, -50%) scale(0.9); opacity: 0.6; }
}

/* TEXT PRESENCE */
#output {
  position: absolute;
  width: 100%;
  text-align: center;
  top: 60%;
  font-size: 18px;
  letter-spacing: 0.5px;
  opacity: 0.9;
}

/* INPUT FLOATING */
#input {
  position: absolute;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  width: 60%;
  padding: 16px;
  border-radius: 30px;
  border: none;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  color: white;
  outline: none;
  text-align: center;
}

/* CURSOR GLOW */
#cursorGlow {
  position: absolute;
  width: 200px;
  height: 200px;
  background: radial-gradient(circle, rgba(0,150,255,0.2), transparent 70%);
  border-radius: 50%;
  pointer-events: none;
  transform: translate(-50%, -50%);
}

</style>
</head>

<body>

<div id="field">
  <div id="orb"></div>
  <div id="output">Nova is online.</div>
  <input id="input" placeholder="Speak..." />
  <div id="cursorGlow"></div>
</div>

<script>

// CURSOR INTERACTION (FEELS ALIVE)
document.addEventListener("mousemove", e => {
  const glow = document.getElementById("cursorGlow");
  glow.style.left = e.clientX + "px";
  glow.style.top = e.clientY + "px";
});

// INPUT HANDLER
document.getElementById("input").addEventListener("keydown", async (e) => {
  if (e.key === "Enter") {
    const text = e.target.value.trim();
    if (!text) return;

    document.getElementById("output").innerText = "Processing...";
    e.target.value = "";

    const res = await fetch("/api/nova", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text })
    });

    const data = await res.json();

    setTimeout(() => {
      document.getElementById("output").innerText = data.reply;
    }, 400);
  }
});

</script>

</body>
</html>
