<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NOVA</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
  font-family: -apple-system, sans-serif;
  color: white;
}

/* CORE FIELD */
#field {
  position: absolute;
  width: 100%;
  height: 100%;
}

/* ORB */
#orb {
  position: absolute;
  width: 260px;
  height: 260px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(0,140,255,0.7), transparent 70%);
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  filter: blur(50px);
  transition: transform 0.2s ease;
}

/* TEXT */
#text {
  position: absolute;
  width: 100%;
  text-align: center;
  top: 65%;
  font-size: 18px;
  opacity: 0.9;
}

/* INPUT */
#input {
  position: absolute;
  bottom: 50px;
  left: 50%;
  transform: translateX(-50%);
  width: 60%;
  padding: 16px;
  border-radius: 30px;
  border: none;
  background: rgba(255,255,255,0.05);
  color: white;
  text-align: center;
  outline: none;
}
</style>
</head>

<body>

<div id="field">
  <div id="orb"></div>
  <div id="text"></div>
  <input id="input" placeholder="..." />
</div>

<script>

const orb = document.getElementById("orb");
const text = document.getElementById("text");

/* 👁️ PRESENCE — TRACK USER BEFORE INPUT */
let userDetected = false;

document.addEventListener("mousemove", (e) => {
  const x = (e.clientX / window.innerWidth - 0.5) * 40;
  const y = (e.clientY / window.innerHeight - 0.5) * 40;

  orb.style.transform = `translate(-50%, -50%) translate(${x}px, ${y}px)`;

  if (!userDetected) {
    userDetected = true;
    firstContact();
  }
});

/* 🧠 FIRST CONTACT */
function firstContact() {
  setTimeout(() => {
    text.innerText = "...";
  }, 300);

  setTimeout(() => {
    text.innerText = "Hey.";
  }, 1200);

  setTimeout(() => {
    text.innerText = "You're here.";
  }, 2200);

  setTimeout(() => {
    text.innerText = "Good.";
  }, 3200);

  setTimeout(() => {
    text.innerText = "Talk to me.";
  }, 4200);
}

/* INPUT */
document.getElementById("input").addEventListener("keydown", async (e) => {
  if (e.key === "Enter") {
    const value = e.target.value.trim();
    if (!value) return;

    text.innerText = "Processing...";
    e.target.value = "";

    const res = await fetch("/api/nova", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: value })
    });

    const data = await res.json();

    setTimeout(() => {
      text.innerText = data.reply;
    }, 400);
  }
});

</script>

</body>
</html>
