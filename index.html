<!DOCTYPE html>
<html>
<head>
  <title>NOVA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      height: 100vh;
      background: #000;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      width: 90%;
      max-width: 640px;
    }

    .log {
      font-size: 18px;
      line-height: 1.7;
      min-height: 160px;
    }

    .line {
      margin-bottom: 8px;
      opacity: 0.9;
    }

    .user {
      opacity: 0.5;
    }

    .input-row {
      margin-top: 25px;
      display: flex;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 16px;
      border-radius: 12px;
      border: none;
      background: #111;
      color: white;
      font-size: 16px;
      outline: none;
    }

    button {
      padding: 16px 20px;
      border-radius: 12px;
      border: none;
      background: white;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }

    .cursor {
      display: inline-block;
      width: 8px;
      height: 18px;
      background: white;
      margin-left: 4px;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%,100% { opacity:1; }
      50% { opacity:0; }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="log" id="log"></div>

  <div class="input-row">
    <input id="input" placeholder="Talk to Nova..." />
    <button onclick="send()">→</button>
  </div>
</div>

<script>
const log = document.getElementById('log');
const input = document.getElementById('input');

let state = {
  goal: null,
  constraint: null,
  phase: "intro"
};

function type(text, speed = 16) {
  return new Promise(resolve => {
    let i = 0;
    const el = document.createElement('div');
    el.className = "line";
    log.appendChild(el);

    function tick() {
      if (i < text.length) {
        el.innerHTML = text.slice(0, i + 1) + '<span class="cursor"></span>';
        i++;
        setTimeout(tick, speed);
      } else {
        el.innerHTML = text;
        resolve();
      }
    }

    tick();
  });
}

function addUser(text) {
  const el = document.createElement('div');
  el.className = "line user";
  el.innerText = "> " + text;
  log.appendChild(el);
}

async function send() {
  const value = input.value.trim();
  if (!value) return;

  addUser(value);
  input.value = "";

  if (state.phase === "intro") {
    state.goal = value;

    await type("Got it.");
    await type("Let me understand this properly...");
    await type("What’s the main thing slowing you down right now?");

    state.phase = "constraint";
    return;
  }

  if (state.phase === "constraint") {
    state.constraint = value;

    await type("Processing...");

    const res = await fetch('/api/nova', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        goal: state.goal,
        constraint: state.constraint
      })
    });

    const data = await res.json();

    await type(data.message);
    await type(data.next);

    state.phase = "active";
    return;
  }

  if (state.phase === "active") {
    await fetch('/api/nova', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: value,
        goal: state.goal
      })
    });

    await type("Continue.");
  }
}

// OPENING SEQUENCE
(async () => {
  await type("Hey.");
  await type("I’m Nova.");
  await type("You don’t need to structure anything.");
  await type("Just tell me what you’re working on.");
})();
</script>

</body>
</html>
