<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NOVA</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: #05070d;
  color: white;
  font-family: -apple-system, sans-serif;
  display: flex;
  flex-direction: column;
}

#feed {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}

.message {
  margin-bottom: 12px;
  line-height: 1.5;
}

.user { opacity: 0.6; }
.nova { opacity: 1; }

#inputBar {
  display: flex;
  padding: 10px;
  border-top: 1px solid #222;
}

input {
  flex: 1;
  padding: 12px;
  border-radius: 8px;
  border: none;
  background: #111;
  color: white;
}

button {
  margin-left: 10px;
  padding: 12px;
  border-radius: 8px;
  border: none;
  background: white;
  color: black;
}
</style>
</head>

<body>

<div id="feed"></div>

<div id="inputBar">
  <input id="input" placeholder="Talk to Nova..." />
  <button onclick="send()">→</button>
</div>

<script>

const feed = document.getElementById("feed");
const input = document.getElementById("input");

function add(text, cls) {
  const div = document.createElement("div");
  div.className = "message " + cls;
  div.innerText = text;
  feed.appendChild(div);
  feed.scrollTop = feed.scrollHeight;
}

add("Nova online.", "nova");

async function send() {
  const text = input.value.trim();
  if (!text) return;

  add("> " + text, "user");
  input.value = "";

  try {
    const res = await fetch("/api/nova", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text })
    });

    const data = await res.json();

    add(data.reply || "No response.", "nova");

  } catch (err) {
    add("Connection error. Try again.", "nova");
  }
}

input.addEventListener("keydown", (e) => {
  if (e.key === "Enter") send();
});

</script>

</body>
</html>
